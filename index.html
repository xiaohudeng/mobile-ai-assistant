<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小小管家 v5.0 - 科学习惯养成</title>
<style>
:root{--bg:#0a0a0f;--card:#1a1a2e;--neon:#00f5ff;--neon2:#ff00ff;--text:#e0e0e0;--text2:#888;--success:#00ff88;--warning:#ffaa00;--danger:#ff4466}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(180deg,var(--card) 0%,transparent 100%);padding:16px;text-align:center;border-bottom:1px solid rgba(0,245,255,0.1)}
.header h1{font-size:20px;background:linear-gradient(90deg,var(--neon),var(--neon2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:280px;background:var(--card);border-right:1px solid rgba(0,245,255,0.1);display:flex;flex-direction:column}
.nav-menu{flex:1;overflow-y:auto;padding:8px}
.nav-item{padding:12px 16px;margin:4px 0;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .3s;color:var(--text2)}
.nav-item:hover{background:rgba(0,245,255,0.1)}
.nav-item.active{background:linear-gradient(90deg,rgba(0,245,255,0.2),transparent);color:var(--neon);border-left:3px solid var(--neon)}
.content{flex:1;overflow-y:auto;padding:20px}
.panel{display:none;animation:fadeIn .3s}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid rgba(0,245,255,0.1)}
.card h3{font-size:15px;color:var(--neon);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;transition:all .3s}
.btn-primary{background:linear-gradient(135deg,var(--neon),var(--neon2));color:white}
.btn-secondary{background:rgba(255,255,255,0.1);color:var(--text)}
.habit-plan{background:rgba(0,0,0,0.2);border-radius:12px;padding:16px;margin-bottom:16px;border-left:4px solid var(--neon)}
.habit-plan h4{font-size:16px;margin-bottom:8px;color:var(--text)}
.habit-plan .desc{color:var(--text2);font-size:13px;margin-bottom:12px;line-height:1.6}
.habit-plan .schedule{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.time-badge{padding:6px 12px;background:rgba(0,245,255,0.1);border-radius:20px;font-size:12px;color:var(--neon);border:1px solid rgba(0,245,255,0.2)}
.habit-plan .progress{background:rgba(0,0,0,0.3);border-radius:8px;height:8px;overflow:hidden;margin-bottom:12px}
.habit-plan .progress-bar{background:linear-gradient(90deg,var(--neon),var(--neon2));height:100%;width:0%;transition:width .5s}
.habit-plan .actions{display:flex;gap:8px;justify-content:flex-end}
.habit-plan.completed{border-left-color:var(--success);opacity:0.7}
.habit-plan.missed{border-left-color:var(--warning)}
.insight-card{background:linear-gradient(135deg,rgba(0,245,255,0.1),rgba(255,0,255,0.1));border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid rgba(0,245,255,0.2)}
.insight-card .icon{font-size:24px;margin-bottom:8px}
.insight-card .title{font-size:14px;font-weight:600;margin-bottom:4px}
.insight-card .desc{font-size:13px;color:var(--text2);line-height:1.6}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:1000}
.modal.show{display:flex}
.modal-content{background:var(--card);border-radius:16px;padding:24px;width:90%;max-width:500px;border:1px solid rgba(0,245,255,0.2)}
.modal-header{font-size:18px;color:var(--neon);margin-bottom:16px}
.modal-body{margin-bottom:20px}
.modal-footer{display:flex;gap:12px;justify-content:flex-end}
input,select,textarea{width:100%;padding:12px;margin:8px 0;background:rgba(0,0,0,0.3);border:1px solid rgba(0,245,255,0.2);border-radius:8px;color:var(--text);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--neon)}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stat-card{background:linear-gradient(135deg,rgba(0,245,255,0.1),rgba(255,0,255,0.1));padding:20px;border-radius:12px;text-align:center}
.stat-value{font-size:32px;font-weight:bold;background:linear-gradient(90deg,var(--neon),var(--neon2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:12px;color:var(--text2)}
</style>
</head>
<body>
<div class="header">
<h1>🏠 小小管家 v5.0</h1>
<div style="font-size:13px;color:var(--text2);margin-top:4px;">科学习惯养成系统</div>
</div>

<div class="main">
<div class="sidebar">
<div class="nav-menu">
<div class="nav-item active" onclick="showPanel('dashboard')"><span>📊</span>今日概览</div>
<div class="nav-item" onclick="showPanel('habits')"><span>🎯</span>习惯计划</div>
<div class="nav-item" onclick="showPanel('insights')"><span>💡</span>智能洞察</div>
<div class="nav-item" onclick="showPanel('reminders')"><span>⏰</span>提醒设置</div>
<div class="nav-item" onclick="showPanel('settings')"><span>⚙️</span>设置</div>
</div>
</div>

<div class="content">
<!-- 仪表盘 -->
<div id="dashboard" class="panel active">
<div class="card">
<h3>🌅 <span id="greetingText">早上好！</span></h3>
<p id="greetingDesc" style="color:var(--text2);margin:8px 0 16px;"></p>
<button onclick="openHabitModal()" class="btn btn-primary" style="width:100%;">+ 创建新习惯计划</button>
</div>

<div class="card">
<h3>📊 今日进度</h3>
<div class="stats-grid" style="margin-top:12px;">
<div class="stat-card"><div class="stat-value" id="todayCompleted">0</div><div class="stat-label">已完成</div></div>
<div class="stat-card"><div class="stat-value" id="todayTotal">0</div><div class="stat-label">总计划</div></div>
<div class="stat-card"><div class="stat-value" id="streakDays">0</div><div class="stat-label">连续天数</div></div>
<div class="stat-card"><div class="stat-value" id="successRate">0%</div><div class="stat-label">成功率</div></div>
</div>
</div>

<div class="card">
<h3>⏰ 即将到来的提醒</h3>
<div id="upcomingList" style="margin-top:12px;"></div>
</div>
</div>

<!-- 习惯计划 -->
<div id="habits" class="panel">
<div class="card">
<h3>🎯 我的习惯养成计划</h3>
<p style="color:var(--text2);font-size:13px;margin-bottom:16px;">科学安排，循序渐进，让好习惯自然养成</p>
<div id="habitPlansList"></div>
</div>
</div>

<!-- 智能洞察 -->
<div id="insights" class="panel">
<div class="card">
<h3>💡 智能洞察</h3>
<p style="color:var(--text2);font-size:13px;margin-bottom:16px;">基于你的行为模式，AI 为你提供的个性化建议</p>
<div id="insightsList"></div>
</div>
</div>

<!-- 提醒设置 -->
<div id="reminders" class="panel">
<div class="card">
<h3>⏰ 提醒偏好</h3>
<p style="color:var(--text2);font-size:13px;margin-bottom:16px;">自定义提醒方式和时间</p>
<label style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
<input type="checkbox" id="gentleReminder" checked style="width:auto;">温柔提醒模式
</label>
<label style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
<input type="checkbox" id="smartAdjust" checked style="width:auto;">智能时间调整
</label>
<label style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
<input type="checkbox" id="encourageMsg" checked style="width:auto;">鼓励消息
</label>
</div>
</div>

<!-- 设置 -->
<div id="settings" class="panel">
<div class="card">
<h3>⚙️ 设置</h3>
<label>你的名字</label>
<input type="text" id="userName" placeholder="输入你的名字" onchange="updateSettings()">
<label>作息类型</label>
<select id="sleepType" onchange="updateSettings()">
<option value="early">早起型 (6 点起床)</option>
<option value="normal" selected>正常型 (8 点起床)</option>
<option value="late">晚睡型 (10 点起床)</option>
</select>
</div>
<div class="card">
<h3>📊 统计</h3>
<div class="stats-grid">
<div class="stat-card"><div class="stat-value" id="totalHabits">0</div><div class="stat-label">总习惯</div></div>
<div class="stat-card"><div class="stat-value" id="totalDays">0</div><div class="stat-label">总天数</div></div>
</div>
</div>
</div>
</div>
</div>

<!-- 创建习惯弹窗 -->
<div id="habitModal" class="modal">
<div class="modal-content">
<div class="modal-header">🎯 创建习惯养成计划</div>
<div class="modal-body">
<label>我想养成的习惯</label>
<input type="text" id="habitGoal" placeholder="例如：每天运动、早睡早起、多喝水...">

<label>为什么想养成这个习惯？</label>
<input type="text" id="habitWhy" placeholder="例如：为了健康、提高效率、改善睡眠...">

<label>当前难度评估</label>
<select id="habitDifficulty">
<option value="easy">简单 - 几乎不需要意志力</option>
<option value="medium" selected>中等 - 需要一些努力</option>
<option value="hard">困难 - 需要很大毅力</option>
</select>

<label>可用时间段</label>
<select id="availableTime">
<option value="morning">早晨 (6:00-9:00)</option>
<option value="noon">中午 (12:00-14:00)</option>
<option value="afternoon">下午 (15:00-18:00)</option>
<option value="evening">晚上 (19:00-22:00)</option>
<option value="flexible">时间灵活</option>
</select>

<div style="background:rgba(0,245,255,0.1);padding:12px;border-radius:8px;margin-top:16px;">
<strong style="color:var(--neon);">🧠 AI 科学建议：</strong>
<p id="aiSuggestion" style="font-size:13px;color:var(--text2);margin-top:8px;line-height:1.6;">根据你的选择，AI 会生成最适合你的习惯养成方案</p>
</div>
</div>
<div class="modal-footer">
<button onclick="closeModal('habitModal')" class="btn btn-secondary">取消</button>
<button onclick="createHabitPlan()" class="btn btn-primary">创建计划</button>
</div>
</div>
</div>

<script>
// ============ 科学习惯养成系统 ============
const Butler={
user:{name:'',sleepType:'normal'},
habits:[],
insights:[],
settings:{gentle:true,smartAdjust:true,encourage:true},

// 习惯模板库
habitTemplates:{
'运动':[
{day:1,action:'散步 5 分钟',time:'afternoon'},
{day:2,action:'散步 10 分钟',time:'afternoon'},
{day:3,action:'快走 10 分钟',time:'afternoon'},
{day:4,action:'快走 15 分钟',time:'afternoon'},
{day:5,action:'慢跑 10 分钟',time:'morning'},
{day:6,action:'慢跑 15 分钟',time:'morning'},
{day:7,action:'休息或轻度活动',time:'flexible'}
],
'喝水':[
{day:1,action:'起床后喝一杯水',time:'morning'},
{day:2,action:'上午喝一杯水',time:'morning'},
{day:3,action:'下午喝一杯水',time:'afternoon'},
{day:4,action:'早中晚各一杯',time:'flexible'},
{day:5,action:'每小时提醒喝水',time:'flexible'},
{day:6,action:'每天 8 杯水',time:'flexible'},
{day:7,action:'保持每天 8 杯',time:'flexible'}
],
'早睡':[
{day:1,action:'比平时早睡 15 分钟',time:'evening'},
{day:2,action:'睡前 1 小时不用手机',time:'evening'},
{day:3,action:'睡前阅读 10 分钟',time:'evening'},
{day:4,action:'固定时间上床',time:'evening'},
{day:5,action:'睡前冥想 5 分钟',time:'evening'},
{day:6,action:'保持固定作息',time:'evening'},
{day:7,action:'回顾一周睡眠',time:'evening'}
],
'阅读':[
{day:1,action:'阅读 5 分钟',time:'evening'},
{day:2,action:'阅读 10 分钟',time:'evening'},
{day:3,action:'阅读 15 分钟',time:'evening'},
{day:4,action:'阅读 20 分钟',time:'evening'},
{day:5,action:'阅读 30 分钟',time:'evening'},
{day:6,action:'做读书笔记',time:'evening'},
{day:7,action:'分享读书心得',time:'evening'}
]
},

// 创建习惯计划
createHabitPlan(goal,why,difficulty,time){
const template=this.matchTemplate(goal);
const plan={
id:Date.now(),
goal,
why,
difficulty,
preferredTime:time,
startDate:new Date().toISOString().split('T')[0],
week:template||this.generatePlan(goal,difficulty),
currentDay:1,
completedDays:[],
missedDays:[],
status:'active'
};
this.habits.push(plan);
this.generateInsights();
return plan;
},

// 匹配已有模板
matchTemplate(goal){
const keywords={
'运动':['运动','跑步','健身','锻炼','散步'],
'喝水':['喝水','饮水','补水'],
'早睡':['早睡','睡眠','作息','熬夜'],
'阅读':['阅读','读书','看书','学习']
};
for(const[key,words]of Object.entries(keywords)){
if(words.some(w=>goal.includes(w)))return this.habitTemplates[key];
}
return null;
},

// 生成自定义计划
generatePlan(goal,difficulty){
const mult=difficulty==='hard'?0.5:difficulty==='medium'?1:1.5;
const week=[];
for(let i=1;i<=7;i++){
week.push({
day:i,
action:`第${i}天：循序渐进`,
time:'flexible'
});
}
return week;
},

// 生成智能洞察
generateInsights(){
this.insights=[];
const completed=this.habits.reduce((sum,h)=>sum+h.completedDays.length,0);
const total=this.habits.reduce((sum,h)=>sum+h.currentDay,0);
const rate=total>0?Math.round(completed/total*100):0;

if(rate>=80){
this.insights.push({
icon:'🎉',
title:'太棒了！执行力超强',
desc:`你的完成率是${rate}%，继续保持！建议可以适当增加挑战性。`
});
}else if(rate>=50){
this.insights.push({
icon:'💪',
title:'不错的进展',
desc:`完成率${rate}%，已经很好了！可以尝试把困难任务拆解得更小。`
});
}else{
this.insights.push({
icon:'🌱',
title:'慢慢来，比较快',
desc:`刚开始可能会有些困难，这很正常。建议从最小的行动开始，建立信心。`
});
}

// 时间洞察
const morningHabits=this.habits.filter(h=>h.preferredTime==='morning').length;
if(morningHabits>2){
this.insights.push({
icon:'🌅',
title:'晨型人',
desc:'你偏好早晨完成任务，这是最高效的时间段！继续保持晨间习惯。'
});
}
},

// 更新习惯状态
updateHabit(id,completed){
const habit=this.habits.find(h=>h.id===id);
if(!habit)return;
if(completed){
habit.completedDays.push(habit.currentDay);
habit.currentDay=Math.min(habit.currentDay+1,7);
}else{
habit.missedDays.push(habit.currentDay);
}
this.generateInsights();
}
},

// UI 函数
function showPanel(id){
document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
event.currentTarget.classList.add('active');
}

function openHabitModal(){document.getElementById('habitModal').classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}

function createHabitPlan(){
const goal=document.getElementById('habitGoal').value.trim();
const why=document.getElementById('habitWhy').value.trim();
const diff=document.getElementById('habitDifficulty').value;
const time=document.getElementById('availableTime').value;

if(!goal){alert('请填写想养成的习惯');return;}

Butler.createHabitPlan(goal,why,diff,time);
closeModal('habitModal');
renderHabitPlans();
renderInsights();
updateStats();
alert('✅ 习惯计划已创建！我会科学地帮你安排，循序渐进地养成好习惯！');
}

function renderHabitPlans(){
const container=document.getElementById('habitPlansList');
if(Butler.habits.length===0){
container.innerHTML='<p style="color:var(--text2);text-align:center;padding:40px;">还没有习惯计划，点击上方按钮创建第一个吧！</p>';
return;
}
container.innerHTML=Butler.habits.map(h=>{
const progress=(h.completedDays.length/h.week.length*100).toFixed(0);
return `<div class="habit-plan ${h.completedDays.length>=h.week.length?'completed':''}">
<h4>🎯 ${h.goal}</h4>
<p class="desc">💡 目的：${h.why||'改善生活'}</p>
<p class="desc">📅 开始于：${h.startDate} | 难度：${h.difficulty==='easy'?'简单':h.difficulty==='medium'?'中等':'困难'}</p>
<div class="schedule">
${h.week.slice(0,3).map(d=>`<span class="time-badge">${d.action}</span>`).join('')}
${h.week.length>3?'<span class="time-badge">...等'+h.week.length+'天计划</span>':''}
</div>
<div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>
<p style="font-size:12px;color:var(--text2);margin-bottom:12px;">进度：${h.completedDays.length}/${h.week.length}天 (${progress}%)</p>
<div class="actions">
<button class="btn btn-secondary" onclick="skipDay(${h.id})">跳过今天</button>
<button class="btn btn-primary" onclick="completeDay(${h.id})">✅ 完成今天</button>
</div>
</div>`;
}).join('');
}

function completeDay(id){
Butler.updateHabit(id,true);
renderHabitPlans();
updateStats();
const habit=Butler.habits.find(h=>h.id===id);
const msgs=['🎉 太棒了！又完成了一天！','💪 坚持就是胜利！','🌟 你正在变得更好！','✨ 好习惯就是这样养成的！'];
alert(msgs[Math.floor(Math.random()*msgs.length)]);
}

function skipDay(id){
Butler.updateHabit(id,false);
renderHabitPlans();
updateStats();
alert('没关系，明天继续！💕');
}

function renderInsights(){
const container=document.getElementById('insightsList');
if(Butler.insights.length===0){
container.innerHTML='<p style="color:var(--text2);text-align:center;">完成一些习惯后，AI 会为你提供个性化洞察</p>';
return;
}
container.innerHTML=Butler.insights.map(i=>`
<div class="insight-card">
<div class="icon">${i.icon}</div>
<div class="title">${i.title}</div>
<div class="desc">${i.desc}</div>
</div>
`).join('');
}

function updateStats(){
const today=new Date().getDay();
const completed=Butler.habits.reduce((sum,h)=>sum+(h.completedDays.includes(h.currentDay)?1:0),0);
const total=Butler.habits.length;
const streak=Math.max(...Butler.habits.map(h=>h.completedDays.length),0);
const rate=total>0?Math.round(completed/total*100):0;

document.getElementById('todayCompleted').textContent=completed;
document.getElementById('todayTotal').textContent=total;
document.getElementById('streakDays').textContent=streak;
document.getElementById('successRate').textContent=rate+'%';
document.getElementById('totalHabits').textContent=Butler.habits.length;
document.getElementById('totalDays').textContent=Butler.habits.reduce((sum,h)=>sum+h.completedDays.length,0);

// 问候语
const hour=new Date().getHours();
const greet=hour<12?'早上好':'下午好';
document.getElementById('greetingText').textContent=greet+'，'+(Butler.user.name||'亲爱的');
document.getElementById('greetingDesc').textContent=`今天有${total}个习惯计划，已完成${completed}个。${rate>=80?'继续保持，你太棒了！':rate>=50?'加油，你做得很好！':'慢慢来，我在陪着你！'}`;
}

function updateSettings(){
Butler.user.name=document.getElementById('userName').value;
Butler.user.sleepType=document.getElementById('sleepType').value;
updateStats();
}

// 初始化
function init(){
// 示例数据
if(Butler.habits.length===0){
Butler.createHabitPlan('每天运动','为了身体健康','medium','morning');
Butler.createHabitPlan('多喝水','改善皮肤和代谢','easy','flexible');
}
renderHabitPlans();
renderInsights();
updateStats();
}

init();
</script>
</body>
</html>
