<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 智能助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;height:100vh;display:flex;flex-direction:column}.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:16px;text-align:center;font-size:18px;font-weight:600}.chat{flex:1;overflow-y:auto;padding:16px}.message{margin-bottom:16px;display:flex;align-items:flex-end}.message.user{justify-content:flex-end}.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}.ai-avatar{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);margin-right:8px}.user-avatar{background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%);margin-left:8px}.bubble{max-width:70%;padding:12px 16px;border-radius:18px;font-size:15px;line-height:1.5}.ai-bubble{background:white;color:#333;border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}.user-bubble{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border-bottom-right-radius:4px}.input-area{padding:12px;background:white;border-top:1px solid #e0e0e0;display:flex;gap:8px}.input-area input{flex:1;padding:12px 16px;border:2px solid #e0e0e0;border-radius:24px;font-size:15px;outline:none}.input-area input:focus{border-color:#667eea}.input-area button{padding:12px 24px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:24px;font-size:15px;cursor:pointer}.loading{text-align:center;padding:8px;color:#999;font-size:13px}.nav{display:flex;background:white;border-top:1px solid #e0e0e0;padding:8px 0}.nav-item{flex:1;text-align:center;padding:8px;color:#999;font-size:12px;cursor:pointer}.nav-item.active{color:#667eea}.nav-item .icon{font-size:20px;display:block;margin-bottom:2px}.settings{padding:16px;display:none;background:#f0f2f5}.settings.active{display:block}.settings-item{background:white;padding:16px;margin-bottom:12px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}.settings-item h3{margin-bottom:8px;font-size:16px;color:#333}.settings-item p{color:#666;font-size:14px;margin-bottom:8px}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:12px}.stat-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:16px;border-radius:12px;text-align:center}.stat-value{font-size:24px;font-weight:bold}.stat-label{font-size:12px;opacity:0.9}
</style>
</head>
<body>
<div class="header">🤖 AI 智能助手</div>
<div id="chatContainer"><div id="chat" class="chat">
<div class="message ai"><div class="avatar ai-avatar">🤖</div><div class="bubble ai-bubble">你好！我是你的 AI 助手，由 Claw 设计。有什么可以帮你的吗？😊</div></div>
</div><div id="loading" class="loading" style="display:none;">🤔 AI 正在思考...</div></div>
<div class="input-area"><input type="text" id="input" placeholder="输入消息..." onkeypress="if(event.key==='Enter')send()"><button id="sendBtn" onclick="send()">发送</button></div>
<div class="nav">
<div class="nav-item active" onclick="showChat()"><span class="icon">💬</span>对话</div>
<div class="nav-item" onclick="showMemory()"><span class="icon">🧠</span>记忆</div>
<div class="nav-item" onclick="showSettings()"><span class="icon">⚙️</span>设置</div>
</div>
