<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 智能助手 - 进化版 v2.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f2f5;height:100vh;display:flex;flex-direction:column}.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:16px;text-align:center;font-size:18px;font-weight:600}.chat{flex:1;overflow-y:auto;padding:16px}.message{margin-bottom:16px;display:flex;align-items:flex-end}.message.user{justify-content:flex-end}.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px}.ai-avatar{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);margin-right:8px}.user-avatar{background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%);margin-left:8px}.bubble{max-width:75%;padding:14px 18px;border-radius:20px;font-size:15px;line-height:1.6}.ai-bubble{background:white;color:#333;border-bottom-left-radius:4px}.user-bubble{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border-bottom-right-radius:4px}.input-area{padding:12px;background:white;border-top:1px solid #e0e0e0;display:flex;gap:8px}.input-area input{flex:1;padding:14px 20px;border:2px solid #e0e0e0;border-radius:28px;font-size:15px;outline:none}.input-area button{padding:14px 28px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:28px;font-size:15px;cursor:pointer}.loading{text-align:center;padding:12px;color:#999;display:none}.nav{display:flex;background:white;border-top:1px solid #e0e0e0;padding:8px 0}.nav-item{flex:1;text-align:center;padding:10px;color:#999;font-size:11px;cursor:pointer}.nav-item.active{color:#667eea;font-weight:600}.settings{padding:16px;display:none;background:#f0f2f5;flex:1;overflow-y:auto}.settings.active{display:block}.settings-item{background:white;padding:16px;margin-bottom:12px;border-radius:12px}.settings-item h3{margin-bottom:8px;font-size:16px;color:#333}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:12px}.stat-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:16px;border-radius:12px;text-align:center}.stat-value{font-size:28px;font-weight:bold}
</style>
</head>
<body>
<div class="header">🧠 AI 智能助手 <small>进化版 v2.0</small></div>
<div id="chatContainer"><div id="chat" class="chat">
<div class="message ai"><div class="avatar ai-avatar">🤖</div><div class="bubble ai-bubble">你好！我是你的 AI 智能助手，由 Claw 设计。我会学习你的偏好，不断进化变得更懂你！有什么可以帮你的吗？😊</div></div>
</div><div id="loading" class="loading">🤔 AI 正在思考...</div></div>
<div class="input-area"><input type="text" id="input" placeholder="输入消息..." onkeypress="if(event.key==='Enter')send()"><button id="sendBtn" onclick="send()">发送</button></div>
<div class="nav">
<div class="nav-item active" onclick="showChat()">💬 对话</div>
<div class="nav-item" onclick="showMemory()">🧠 记忆</div>
<div class="nav-item" onclick="showEvolution()">🧬 进化</div>
<div class="nav-item" onclick="showSettings()">⚙️ 设置</div>
</div>
<div id="memory" class="settings"><div class="settings-item"><h3>📚 记忆库</h3><p>已存储 <strong><span id="memCount">0</span></strong> 条记忆</p><div id="memoryList" style="margin-top:12px;"></div></div></div>
<div id="evolution" class="settings"><div class="settings-item"><h3>🧬 进化状态</h3><p>版本：<strong id="evoVer">2.0</strong></p><p>交互：<strong id="evoInt">0</strong></p><p>规则：<strong id="evoRule">0</strong></p><p>智能：<strong id="evoIQ">初始</strong></p></div></div>
<div id="settings" class="settings">
<div class="settings-item"><h3>🎨 回复风格</h3><select id="styleSelect" onchange="AI.style=this.value" style="width:100%;padding:10px;border-radius:8px;margin:8px 0;"><option value="concise">简洁</option><option value="balanced" selected>平衡</option><option value="detailed">详细</option><option value="friendly">友好</option></select></div>
<div class="settings-item"><h3>📊 统计</h3><div class="stats"><div class="stat-card"><div class="stat-value" id="msgCount">1</div><div>对话数</div></div><div class="stat-card"><div class="stat-value" id="memCount2">0</div><div>记忆数</div></div></div></div>
<div class="settings-item"><h3>🗑️ 数据</h3><button onclick="clearAll()" style="padding:12px 24px;background:#f44336;color:white;border:none;border-radius:8px;cursor:pointer;">清除所有数据</button></div>
</div>
<script>
const AI={memories:[],interactions:0,rules:[],style:'balanced',
think(input){this.interactions++;const l=input.toLowerCase();
if(l.includes('你好')||l.includes('hello'))return this.r(['你好！很高兴为你服务！😊','嗨！有什么可以帮你的吗？😊','你好呀！随时为你效劳！😊']);
if(l.includes('名字')||l.includes('是谁'))return this.r(['我是你的 AI 智能助手，由 Claw 设计！🧠','我是 Claw 创造的 AI 助手，会学习你的偏好！🤖']);
if(l.includes('功能')||l.includes('能做什么'))return this.r(['我可以聊天、问答、学习、进化！越用越懂你！⚡','聊天、学习、记忆、进化，我都在行！🚀']);
if(l.includes('喜欢')){this.memories.push({type:'偏好',content:input,time:new Date().toLocaleTimeString()});return this.r(['记下了！我会记住你的偏好！📚','好的，已经存入记忆库了！🧠']);}
if(l.includes('记忆'))return this.r(['我有'+this.memories.length+'条记忆，都是关于你的重要事情！📖','已经记住了'+this.memories.length+'件事，越来越懂你了！💡']);
if(l.includes('进化')||l.includes('学习'))return this.r(['我每天都在进化！已经学习了'+this.interactions+'次！🧬','学习是我最擅长的事！每次对话都让我更聪明！✨']);
if(l.includes('再见'))return this.r(['再见！随时找我！👋','拜拜！期待下次聊天！😊']);
if(l.includes('谢谢'))return this.r(['不客气！😊','应该的！随时为你效劳！']);
return this.r(['明白了！还有其他的吗？😊','收到！继续聊！','好的，我在听！']);
},
r(arr){return arr[Math.floor(Math.random()*arr.length)]},
learn(input){if(input.length>10)this.memories.push({type:'对话',content:input,time:new Date().toLocaleTimeString()});if(this.memories.length>50)this.memories.splice(0,25);}};

const chat=document.getElementById('chat'),input=document.getElementById('input'),sendBtn=document.getElementById('sendBtn'),loading=document.getElementById('loading');
let msgCount=1;

function send(){const text=input.value.trim();if(!text)return;addMessage(text,true);input.value='';sendBtn.disabled=true;loading.style.display='block';
setTimeout(()=>{const reply=AI.think(text);addMessage(reply,false);loading.style.display='none';sendBtn.disabled=false;msgCount++;update();input.focus();},600+Math.random()*400);}

function addMessage(text,isUser){const d=document.createElement('div');d.className='message'+(isUser?' user':' ai');
d.innerHTML=(isUser?'':'<div class="avatar ai-avatar">🤖</div>')+'<div class="bubble '+(isUser?'user':'ai')+'-bubble">'+text+'</div>'+(isUser?'<div class="avatar user-avatar">👤</div>':'');
chat.appendChild(d);chat.scrollTop=chat.scrollHeight;}

function showChat(){hideAll();document.getElementById('chatContainer').style.display='flex';activeNav(0);}
function showMemory(){hideAll();document.getElementById('memory').style.display='block';activeNav(1);updateMem();}
function showEvolution(){hideAll();document.getElementById('evolution').style.display='block';activeNav(2);}
function showSettings(){hideAll();document.getElementById('settings').style.display='block';activeNav(3);}
function hideAll(){document.getElementById('chatContainer').style.display='none';document.getElementById('memory').style.display='none';document.getElementById('evolution').style.display='none';document.getElementById('settings').style.display='none';}
function activeNav(i){document.querySelectorAll('.nav-item').forEach((e,j)=>e.classList.toggle('active',i===j));}

function update(){document.getElementById('msgCount').textContent=msgCount;document.getElementById('memCount').textContent=AI.memories.length;document.getElementById('memCount2').textContent=AI.memories.length;
document.getElementById('evoInt').textContent=AI.interactions;document.getElementById('evoRule').textContent=AI.rules.length;
const lv=['初始','学习','适应','智能','精通'][Math.min(Math.floor(AI.interactions/10),4)];document.getElementById('evoIQ').textContent=lv;}

function updateMem(){const l=document.getElementById('memoryList');l.innerHTML=AI.memories.slice(-10).reverse().map(m=>'<div style="padding:8px;border-bottom:1px solid #eee;font-size:13px;"><strong>'+m.type+'</strong>: '+m.content+' <span style="color:#999;float:right">'+m.time+'</span></div>').join('')||'<p style="color:#999;text-align:center;">暂无记忆</p>';}

function clearAll(){if(confirm('确定清除？')){chat.innerHTML='<div class="message ai"><div class="avatar ai-avatar">🤖</div><div class="bubble ai-bubble">你好！我是 AI 助手！😊</div></div>';AI.memories=[];AI.interactions=0;AI.rules=[];msgCount=1;update();updateMem();alert('已清除');}}
</script>
</body>
</html>
